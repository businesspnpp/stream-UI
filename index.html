<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Low-Bandwidth Stream Monitor</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            width: 350px;
            font-size: 0.9rem;
        }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .status {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 10px;
            min-height: 20px;
        }
        canvas {
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1024px;
            height: auto;
            border: 1px solid #1e293b;
            display: block;
            margin: 0 auto;
        }
        .hint {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Live Monitor Stream</h2>

    <div class="controls">
        <input type="text" id="serverUrl" placeholder="wss://sharestream-relay.onrender.com/live" />
        <button id="connectBtn">Connect Live Feed</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
        <button id="downloadBtn">Download Last Recording (.h264)</button>
    </div>

    <div class="status" id="statusLabel">Status: Disconnected</div>

    <canvas id="livePlayer" width="1280" height="720"></canvas>

    <p class="hint">Decoded in-browser via WebCodecs (Chrome / Edge / latest Firefox &amp; Safari). The download link returns a raw Annex-B H.264 file &mdash; playable in VLC, or convert with <code>ffmpeg -i live_record.h264 -c copy out.mp4</code>.</p>
</div>

<script>
    const connectBtn      = document.getElementById('connectBtn');
    const disconnectBtn   = document.getElementById('disconnectBtn');
    const downloadBtn     = document.getElementById('downloadBtn');
    const serverUrlInput  = document.getElementById('serverUrl');
    const statusLabel     = document.getElementById('statusLabel');
    const canvas          = document.getElementById('livePlayer');
    const ctx             = canvas.getContext('2d');

    let activeSocket = null;
    let decoder      = null;
    let frameCounter = 0;
    let decoderReady = false;

    const cachedUrl = localStorage.getItem('last_stream_url');
    if (cachedUrl) serverUrlInput.value = cachedUrl;

    if (!('VideoDecoder' in window)) {
        statusLabel.innerText = "Status: WebCodecs not supported in this browser. Use Chrome 94+ / Edge / Firefox 130+ / Safari 16.4+.";
        statusLabel.style.color = "#f87171";
        connectBtn.disabled = true;
    }

    // Normalize whatever the user pastes (http/https/ws/wss, with or without
    // a path) into the expected wss://host/live form.
    function normalizeLiveUrl(raw) {
        let s = (raw || '').trim();
        if (!s) return '';
        if (!/^(wss?|https?):\/\//i.test(s)) s = 'wss://' + s;
        let u;
        try { u = new URL(s); } catch (_) { return ''; }
        if (u.protocol === 'https:') u.protocol = 'wss:';
        else if (u.protocol === 'http:') u.protocol = 'ws:';
        if (!u.pathname || u.pathname === '/' || u.pathname === '') u.pathname = '/live';
        return u.toString();
    }

    // Derive the matching https://.../download/live_record.h264 from the WS URL.
    downloadBtn.addEventListener('click', () => {
        const raw = serverUrlInput.value.trim() || serverUrlInput.placeholder;
        const wsUrl = normalizeLiveUrl(raw);
        try {
            const u = new URL(wsUrl || raw);
            u.protocol = u.protocol === 'wss:' ? 'https:' : 'http:';
            u.pathname = '/download/live_record.h264';
            window.open(u.toString(), '_blank');
        } catch (e) {
            alert('Enter a valid wss:// URL first.');
        }
    });

    function setStatus(text, color) {
        statusLabel.innerText = `Status: ${text}`;
        statusLabel.style.color = color || "#94a3b8";
    }

    function teardown() {
        if (activeSocket) {
            try { activeSocket.close(); } catch (_) {}
            activeSocket = null;
        }
        if (decoder && decoder.state !== 'closed') {
            try { decoder.close(); } catch (_) {}
        }
        decoder = null;
        decoderReady = false;
        frameCounter = 0;
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
    }

    disconnectBtn.addEventListener('click', () => {
        teardown();
        setStatus("Disconnected by user.", "#f87171");
    });

    // Scan an Annex-B buffer for an IDR (NAL type 5) or SPS (NAL type 7).
    // Either marks a random-access point that the decoder treats as 'key'.
    function isKeyframeAU(u8) {
        const len = u8.length;
        let i = 0;
        while (i + 4 < len) {
            // Match 0x000001 or 0x00000001 start codes.
            if (u8[i] === 0 && u8[i+1] === 0) {
                let hdr = -1;
                if (u8[i+2] === 1) hdr = i + 3;
                else if (u8[i+2] === 0 && u8[i+3] === 1) hdr = i + 4;
                if (hdr > 0 && hdr < len) {
                    const nalType = u8[hdr] & 0x1F;
                    if (nalType === 5 || nalType === 7) return true;
                    i = hdr;
                    continue;
                }
            }
            i++;
        }
        return false;
    }

    connectBtn.addEventListener('click', async () => {
        const raw = serverUrlInput.value.trim() || serverUrlInput.placeholder;
        const targetUrl = normalizeLiveUrl(raw);
        if (!targetUrl) return alert("Please specify a valid server endpoint.");
        serverUrlInput.value = targetUrl;
        localStorage.setItem('last_stream_url', targetUrl);

        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        setStatus("Configuring WebCodecs decoder...");

        // H.264 Baseline 3.1 — matches the openh264 encoder config on the desktop.
        const codec = 'avc1.42E01F';
        try {
            const support = await VideoDecoder.isConfigSupported({ codec });
            if (!support.supported) {
                setStatus(`Browser cannot decode ${codec}`, "#f87171");
                return teardown();
            }
        } catch (e) {
            setStatus(`Decoder probe failed: ${e}`, "#f87171");
            return teardown();
        }

        decoder = new VideoDecoder({
            output: (frame) => {
                if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
                    canvas.width  = frame.displayWidth;
                    canvas.height = frame.displayHeight;
                }
                ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
                frame.close();
            },
            error: (e) => {
                console.error("Decoder error:", e);
                setStatus(`Decoder error: ${e.message}`, "#f87171");
            }
        });
        // No `description` = decoder expects Annex-B in-band SPS/PPS.
        decoder.configure({
            codec,
            optimizeForLatency: true,
            hardwareAcceleration: "prefer-hardware"
        });
        decoderReady = true;

        const ws = new WebSocket(targetUrl);
        activeSocket = ws;
        ws.binaryType = "arraybuffer";

        ws.onopen = () => setStatus("Connected. Awaiting first keyframe...", "#fbbf24");

        let sawKey = false;
        const startTs = performance.now();
        ws.onmessage = (event) => {
            if (!decoderReady) return;
            const u8 = new Uint8Array(event.data);
            if (u8.length === 0) return;
            const isKey = isKeyframeAU(u8);
            if (!sawKey) {
                if (!isKey) return;        // Wait until a random-access point.
                sawKey = true;
                setStatus("Live stream playing.", "#4ade80");
            }
            try {
                decoder.decode(new EncodedVideoChunk({
                    type: isKey ? 'key' : 'delta',
                    timestamp: Math.round((frameCounter++ * 1_000_000) / 30),
                    data: u8
                }));
            } catch (e) {
                console.warn("decode() failed:", e);
            }
        };

        ws.onclose = () => {
            setStatus("Stream pipeline disconnected.", "#f87171");
            teardown();
        };
        ws.onerror = (err) => {
            console.error("Socket error:", err);
            setStatus("Error connecting to host.", "#f87171");
            teardown();
        };
    });
</script>
</body>
</html>
